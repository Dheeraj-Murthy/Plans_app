name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plans_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Rust (Android)
        run: cd rust && bash build_android.sh

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Build APK
        run: flutter build apk --release

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/bundle/release/app-release.aab dist/
          cp build/app/outputs/apk/release/app-release.apk dist/

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: plans_app/dist/

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: plans_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Rust (macOS)
        run: bash rust/build_macos.sh

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package .app
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent Plans.app Plans.zip

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp build/macos/Build/Products/Release/Plans.zip dist/

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: plans_app/dist/

  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plans_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev liblzma-dev pkg-config libsecret-1-dev

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Rust (Linux)
        run: cargo build --release --manifest-path rust/Cargo.toml

      - name: Build Linux app
        run: flutter build linux --release

      - name: Copy Rust lib into bundle
        run: |
          cp rust/target/release/libplans_core.so build/linux/x64/release/bundle/lib/

      - name: Package bundle
        run: |
          cd build/linux/x64/release
          tar czf plans-linux.tar.gz bundle

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp build/linux/x64/release/plans-linux.tar.gz dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: plans_app/dist/

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plans_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Rust (Windows)
        run: cargo build --release --manifest-path rust/Cargo.toml

      - name: Build Windows app
        run: flutter build windows --release

      - name: Copy Rust dll into bundle
        shell: pwsh
        run: |
          Copy-Item rust\target\release\plans_core.dll build\windows\x64\runner\Release\

      - name: Package bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release -DestinationPath build\windows\x64\runner\plans-windows.zip

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item build\windows\x64\runner\plans-windows.zip dist\

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: plans_app\dist\

  release:
    needs: [android, macos, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.aab
            app-release.apk
            Plans.zip
            plans-linux.tar.gz
            plans-windows.zip
          generate_release_notes: true
